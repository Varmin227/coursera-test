<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My Coursera Test Page</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    /* Simple layout example */
    body {
      font-family: Arial, sans-serif;
      margin: 0;
    }
    header, footer {
      background: #333;
      color: #fff;
      padding: 1rem;
      text-align: center;
    }
    nav {
      background: #555;
      color: #fff;
      padding: 0.5rem 1rem;
    }
    nav a {
      color: #fff;
      margin-right: 1rem;
      text-decoration: none;
    }
    main {
      display: flex;
      flex-wrap: wrap;
      padding: 1rem;
    }
    .sidebar {
      flex: 1 1 200px;
      max-width: 250px;
      padding: 1rem;
      background: #f4f4f4;
    }
    .content {
      flex: 3 1 300px;
      padding: 1rem;
    }
  </style>
</head>
<body>
  <header>
    <h1>My GitHub Pages Site<br>
    this is my first code</h1>
  </header>

  <nav>
    <a href="#">Home</a>
    <a href="#">About</a>
  </nav>

  <main>
    <aside class="sidebar">
      <h2>Sidebar</h2>
      <p>Links or extra info go here.</p>
    </aside>

    <section class="content">
      <h2>Main Content</h2>
      <p>This is where your page content goes.</p>
    </section>
  </main>
  <a href="before.html" title="the other page">check out my other page</a>

  <footer>
    <p>© 2024 My Site</p>
  </footer>
</body>
</html>
